<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>EVER GAY - Mario Experience</title>
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body {
            margin: 0; display: flex; flex-direction: column; align-items: center; justify-content: center;
            min-height: 100vh; background-color: #ffb6c1; font-family: 'Arial Black', sans-serif;
            overflow: hidden; touch-action: manipulation; user-select: none; padding: 10px;
        }
        .cabecera { position: relative; display: flex; align-items: center; justify-content: center; height: 180px; width: 100%; margin-bottom: 10px; }
        .foto-fondo {
            position: absolute; width: 140px; height: 140px; object-fit: cover; z-index: 1; opacity: 0.8;
            clip-path: path('M70,21 C70,21 63,0 38.5,0 C17.5,0 0,17.5 0,38.5 C0,70 31.5,91 70,126 C108.5,91 140,70 140,38.5 C140,17.5 122.5,0 101.5,0 C77,0 70,21 70,21 Z');
            transform: scale(1.2); background: #ff00ff; /* Backup si no hay imagen */
        }
        h1 {
            font-size: clamp(24px, 8vw, 45px); text-transform: uppercase; text-align: center; position: relative; z-index: 2;
            background: linear-gradient(to bottom, #ffffff 0%, #ff00ff 50%, #8b00ff 100%);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin: 0;
            filter: drop-shadow(3px 3px 0px #000); animation: parpadeo 0.8s steps(2, start) infinite;
        }
        @keyframes parpadeo { to { visibility: hidden; } }
        #game-container {
            position: relative; width: 100%; max-width: 600px; height: 200px;
            background-color: rgba(255, 255, 255, 0.3); border-bottom: 4px solid #d14789; border-radius: 15px; overflow: hidden;
        }
        canvas { width: 100%; height: 100%; display: block; }
        .instrucciones { font-size: 14px; color: #d14789; font-weight: bold; text-align: center; margin-top: 15px; }
    </style>
</head>
<body>

    <div class="cabecera">
        <img src="perro.png" alt="" class="foto-fondo">
        <h1>EVER GAY EL VIDEOJUEGO</h1>
    </div>

    <div id="game-container">
        <canvas id="gameCanvas" width="600" height="200"></canvas>
    </div>
    <p class="instrucciones">¡TOMA LA CERVEZA PARA SER INVENCIBLE!<br>TOCA PARA SALTAR</p>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        let audioCtx, musicStarted = false;

        function initAudio() { if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)(); }

        function speak(text) {
            window.speechSynthesis.cancel();
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'es-MX'; utterance.pitch = 1.8; utterance.rate = 1.2;
            window.speechSynthesis.speak(utterance);
        }

        let player = { x: 50, y: 140, dy: 0, jumpForce: 12, gravity: 0.6, grounded: true, invincible: false };
        let obstacles = [];
        let items = [];
        let score = 0;
        let gameActive = true;

        function drawCharacter(x, y) {
            // Color dorado si es invencible
            ctx.fillStyle = player.invincible ? "#FFD700" : "#3d2b1f";
            ctx.beginPath(); ctx.arc(x + 20, y - 5, 9, 0, Math.PI * 2); ctx.fill();
            ctx.fillStyle = player.invincible ? "#FFF" : "#0000FF";
            ctx.beginPath(); ctx.ellipse(x + 20, y + 22, 18, 22, 0, 0, Math.PI * 2); ctx.fill();
            // Piernas/Brazos
            ctx.strokeStyle = "#3d2b1f"; ctx.lineWidth = 4;
            ctx.beginPath(); ctx.moveTo(x + 5, y + 15); ctx.lineTo(x - 5, y + 30);
            ctx.moveTo(x + 35, y + 15); ctx.lineTo(x + 45, y + 30);
            ctx.stroke();
        }

        function drawBeer(x, y) {
            ctx.fillStyle = "#FFD700"; ctx.fillRect(x, y, 15, 25); // Cuerpo
            ctx.fillStyle = "#8B4513"; ctx.fillRect(x+4, y-8, 7, 8); // Cuello
            ctx.fillStyle = "white"; ctx.fillRect(x, y, 15, 5); // Espuma
        }

        function update() {
            if (!gameActive) return;
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            if (!player.grounded) { player.dy += player.gravity; player.y += player.dy; }
            if (player.y >= 140) { player.y = 140; player.grounded = true; }

            // Generar Obstáculos
            if (Math.random() < 0.02) obstacles.push({ x: canvas.width + 50, y: 140 });
            // Generar Cerveza
            if (Math.random() < 0.005) items.push({ x: canvas.width + 50, y: 100 });

            // Dibujar Items (Cerveza)
            items.forEach((item, i) => {
                item.x -= 5;
                drawBeer(item.x, item.y);
                if (player.x < item.x + 15 && player.x + 40 > item.x && player.y < item.y + 25 && player.y + 40 > item.y) {
                    items.splice(i, 1);
                    player.invincible = true;
                    setTimeout(() => player.invincible = false, 5000);
                }
            });

            // Dibujar Obstáculos
            obstacles.forEach((obs, i) => {
                obs.x -= 6;
                ctx.fillStyle = "black"; ctx.fillRect(obs.x, obs.y + 20, 20, 30);
                
                // Colisión
                if (player.x + 30 > obs.x && player.x < obs.x + 20 && player.y + 40 > obs.y + 20) {
                    if (!player.invincible) {
                        gameActive = false;
                        speak("ay que ricooo");
                        setTimeout(() => location.reload(), 2000);
                    }
                }
                if (obs.x + 30 < 0) { obstacles.splice(i, 1); score++; }
            });

            drawCharacter(player.x, player.y);
            ctx.fillStyle = "#d14789"; ctx.font = "bold 18px Arial";
            ctx.fillText("Puntos: " + score, 480, 30);
            if(player.invincible) ctx.fillText("¡MODO BORRACHO ACTIVO!", 20, 30);

            requestAnimationFrame(update);
        }

        const jump = (e) => { 
            if(e) e.preventDefault();
            initAudio();
            if (player.grounded && gameActive) { 
                player.dy = -player.jumpForce; 
                player.grounded = false;
                speak("hay"); 
            } 
        };

        document.getElementById("game-container").addEventListener("mousedown", jump);
        document.getElementById("game-container").addEventListener("touchstart", jump);
        update();
    </script>
</body>
</html>
