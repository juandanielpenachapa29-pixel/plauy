<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>EVER GAY - Mario Experience</title>
    <link href="https://googleapis.com" rel="stylesheet">
    <style>
        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background-color: #ffb6c1;
            font-family: 'Arial Black', sans-serif;
            overflow: hidden;
            touch-action: manipulation;
            user-select: none;
            padding: 10px;
        }

        .cabecera {
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 180px;
            width: 100%;
            margin-bottom: 10px;
        }

        .foto-fondo {
            position: absolute;
            width: 140px; 
            height: 140px;
            object-fit: cover;
            z-index: 1;
            opacity: 0.8;
            clip-path: path('M70,21 C70,21 63,0 38.5,0 C17.5,0 0,17.5 0,38.5 C0,70 31.5,91 70,126 C108.5,91 140,70 140,38.5 C140,17.5 122.5,0 101.5,0 C77,0 70,21 70,21 Z');
            transform: scale(1.2);
        }

        h1 {
            font-family: 'Permanent Marker', cursive;
            font-size: clamp(24px, 8vw, 45px); 
            text-transform: uppercase;
            text-align: center;
            position: relative;
            z-index: 2;
            background: linear-gradient(to bottom, #ffffff 0%, #ff00ff 50%, #8b00ff 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin: 0;
            filter: drop-shadow(3px 3px 0px #000);
            transform: rotate(-2deg);
            animation: parpadeo 0.8s steps(2, start) infinite;
            line-height: 1;
        }

        @keyframes parpadeo { to { visibility: hidden; } }

        #game-container {
            position: relative;
            width: 100%;
            max-width: 600px;
            height: 200px;
            background-color: rgba(255, 255, 255, 0.3);
            border-bottom: 4px solid #d14789;
            border-radius: 15px;
            cursor: pointer;
            overflow: hidden;
        }

        canvas { 
            width: 100%; 
            height: 100%; 
            display: block; 
        }

        .instrucciones { 
            font-size: 14px; 
            color: #d14789; 
            font-weight: bold; 
            text-align: center; 
            margin-top: 15px;
        }
    </style>
</head>
<body>

    <div class="cabecera">
        <img src="perro.png" alt="Fondo" class="foto-fondo">
        <h1>EVER GAY EL VIDEOJUEGO</h1>
    </div>

    <div id="game-container">
        <canvas id="gameCanvas" width="600" height="200"></canvas>
    </div>
    <p class="instrucciones">¡TOCA LA PANTALLA PARA SALTAR!<br>(Sube el volumen)</p>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        let audioCtx;
        let musicStarted = false;
        let musicTimeout;

        function initAudio() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
        }

        function playNote(freq, start, duration, type = 'square', vol = 0.1) {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = type;
            osc.frequency.setValueAtTime(freq, start);
            gain.gain.setValueAtTime(vol, start);
            gain.gain.exponentialRampToValueAtTime(0.0001, start + duration);
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start(start);
            osc.stop(start + duration);
        }

        function playMarioFull() {
            if (!gameActive) return;
            const now = audioCtx.currentTime;
            const t = 0.13;
            const m = [329.63, 329.63, 0, 329.63, 0, 261.63, 329.63, 0, 392.00, 0, 0, 0, 196.00, 0, 0, 0];
            m.forEach((f, i) => {
                if (f > 0) {
                    playNote(f, now + i * t, 0.15, 'square', 0.15);
                }
            });
            musicTimeout = setTimeout(playMarioFull, 2100);
        }

        function speakMoan(type) {
            window.speechSynthesis.cancel();
            const text = type === 'jump' ? "ah" : "ay que ricooo";
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'es-MX'; 
            utterance.pitch = 2.0;
            utterance.rate = 1.4;
            window.speechSynthesis.speak(utterance);
        }

        let player = { x: 50, y: 140, dy: 0, jumpForce: 12, gravity: 0.6, grounded: true };
        let obstacles = [];
        let score = 0;
        let gameActive = true;

        function drawCharacter(x, y) {
            ctx.fillStyle = "#3d2b1f";
            ctx.beginPath(); ctx.arc(x + 20, y - 5, 9, 0, Math.PI * 2); ctx.fill();
            ctx.strokeStyle = "white"; ctx.lineWidth = 1;
            ctx.beginPath(); ctx.arc(x + 16, y - 5, 2, 0, Math.PI * 2); ctx.arc(x + 24, y - 5, 2, 0, Math.PI * 2); ctx.stroke();
            ctx.fillStyle = "#0000FF";
            ctx.beginPath(); ctx.ellipse(x + 20, y + 22, 18, 22, 0, 0, Math.PI * 2); ctx.fill();
            ctx.strokeStyle = "#3d2b1f"; ctx.lineWidth = 4;
            ctx.beginPath(); ctx.moveTo(x + 5, y + 15); ctx.lineTo(x - 5, y + 30);
            ctx.moveTo(x + 35, y + 15); ctx.lineTo(x + 45, y + 30);
            ctx.moveTo(x + 12, y + 42); ctx.lineTo(x + 8, y + 55);
            ctx.moveTo(x + 28, y + 42); ctx.lineTo(x + 32, y + 55); ctx.stroke();
        }

        function drawObstacle(x, y) {
            ctx.fillStyle = "black";
            ctx.beginPath(); ctx.arc(x-8, y+35, 12, 0, Math.PI*2); ctx.arc(x+8, y+35, 12, 0, Math.PI*2); ctx.fill();
            ctx.fillRect(x-6, y+5, 12, 35);
            ctx.beginPath(); ctx.ellipse(x, y+5, 10, 7, 0, 0, Math.PI*2); ctx.fill();
        }

        function update() {
            if (!gameActive) return;
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            if (!player.grounded) { player.dy += player.gravity; player.y += player.dy; }
            if (player.y >= 140) { player.y = 140; player.grounded = true; }
            drawCharacter(player.x, player.y);
            if (Math.random() < 0.02) obstacles.push({ x: canvas.width + 50, y: 140 });
            obstacles.forEach((obs, index) => {
                obs.x -= 6;
                drawObstacle(obs.x, obs.y);
                if (player.x + 25 > obs.x - 10 && player.x < obs.x + 10 && player.y + 40 > obs.y) {
                    gameActive = false;
                    speakMoan('death');
                    setTimeout(() => { location.reload(); }, 2000);
                }
                if (obs.x + 30 < 0) { obstacles.splice(index, 1); score++; }
            });
            ctx.fillStyle = "#d14789"; ctx.font = "bold 18px Arial";
            ctx.fillText("Puntos: " + score, 480, 30);
            requestAnimationFrame(update);
        }

        const jump = (e) => { 
            if(e) e.preventDefault();
            initAudio();
            if (!musicStarted) { playMarioFull(); musicStarted = true; }
            if (player.grounded && gameActive) { 
                player.dy = -player.jumpForce; 
                player.grounded = false;
                speakMoan('jump'); 
            } 
        };

        window.addEventListener("keydown", (e) => { if (e.code === "Space") jump(); });
        document.getElementById("game-container").addEventListener("touchstart", jump);
        document.getElementById("game-container").addEventListener("click", jump);
        update();
    </script>
</body>
</html>
