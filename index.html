<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EVER GAY - Mario Experience</title>
    <link href="https://googleapis.com" rel="stylesheet">
    <style>
        body {
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background-color: #ffb6c1;
            font-family: 'Arial Black', sans-serif;
            gap: 15px;
            overflow: hidden;
        }

        .cabecera {
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 250px;
            width: 100%;
        }

        .foto-fondo {
            position: absolute;
            width: 200px; /* Tamaño base aumentado */
            height: 200px;
            object-fit: cover; /* Rellena el corazón sin deformar */
            object-position: center;
            z-index: 1;
            opacity: 0.8;
            /* Clip-path optimizado para ocupar el 100% del contenedor cuadrado */
            clip-path: path('M100,30 C100,30 90,0 55,0 C25,0 0,25 0,55 C0,100 45,130 100,180 C155,130 200,100 200,55 C200,25 175,0 145,0 C110,0 100,30 100,30 Z');
            transform: scale(1.15); /* Tu aumento del 15% solicitado */
        }

        h1 {
            font-family: 'Permanent Marker', cursive;
            font-size: 60px; 
            text-transform: uppercase;
            text-align: center;
            position: relative;
            z-index: 2;
            background: linear-gradient(to bottom, #ffffff 0%, #ff00ff 50%, #8b00ff 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin: 0;
            filter: drop-shadow(4px 4px 0px #000) 
                    drop-shadow(-1px -1px 0px #000);
            letter-spacing: -2px;
            transform: rotate(-2deg);
            animation: parpadeo 0.8s steps(2, start) infinite;
        }

        @keyframes parpadeo { to { visibility: hidden; } }

        #game-container {
            position: relative;
            width: 600px;
            height: 220px;
            background-color: rgba(255, 255, 255, 0.3);
            border-bottom: 4px solid #d14789;
            border-radius: 15px;
        }

        canvas { display: block; }
        .instrucciones { font-size: 16px; color: #d14789; font-weight: bold; text-align: center; }
    </style>
</head>
<body>

    <div class="cabecera">
        <img src="perro.png" alt="Fondo" class="foto-fondo">
        <h1>EVER GAY EL VIDEOJUEGO</h1>
    </div>

    <div id="game-container">
        <canvas id="gameCanvas" width="600" height="220"></canvas>
    </div>
    <p class="instrucciones">¡CLICK PARA MÚSICA Y SALTAR!<br>(Sube el volumen)</p>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        let musicStarted = false;
        let musicTimeout;

        function playNote(freq, start, duration, type = 'square', vol = 0.1) {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = type;
            osc.frequency.setValueAtTime(freq, start);
            gain.gain.setValueAtTime(vol, start);
            gain.gain.exponentialRampToValueAtTime(0.0001, start + duration);
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start(start);
            osc.stop(start + duration);
        }

        function playMarioFull() {
            if (!gameActive) return;
            const now = audioCtx.currentTime;
            const t = 0.13;
            const m = [329.63, 329.63, 0, 329.63, 0, 261.63, 329.63, 0, 392.00, 0, 0, 0, 196.00, 0, 0, 0];
            m.forEach((f, i) => {
                if (f > 0) {
                    playNote(f, now + i * t, 0.15, 'square', 0.15);
                    if (i % 4 === 0) playNote(f/2, now + i * t, 0.2, 'triangle', 0.1);
                }
            });
            musicTimeout = setTimeout(playMarioFull, 2100);
        }

        function speakMoan(type) {
            window.speechSynthesis.cancel();
            const text = type === 'jump' ? "ah" : "ay que ricooo";
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'es-MX'; 
            utterance.pitch = 1.8;
            utterance.rate = 1.2;
            window.speechSynthesis.speak(utterance);
        }

        function playDeath() {
            const now = audioCtx.currentTime;
            const d = [493.88, 523.25, 587.33, 0, 329.63, 392.00, 261.63, 0];
            d.forEach((f, i) => { if(f > 0) playNote(f, now + i*0.15, 0.4, 'square', 0.2); });
        }

        let player = { x: 50, y: 160, w: 40, h: 60, dy: 0, jumpForce: 14, gravity: 0.7, grounded: true };
        let obstacles = [];
        let score = 0;
        let gameActive = true;

        function drawCharacter(x, y) {
            ctx.fillStyle = "#3d2b1f";
            ctx.beginPath(); ctx.arc(x + 20, y - 5, 9, 0, Math.PI * 2); ctx.fill();
            ctx.strokeStyle = "white"; ctx.lineWidth = 1;
            ctx.beginPath(); ctx.arc(x + 16, y - 5, 3, 0, Math.PI * 2); ctx.arc(x + 24, y - 5, 3, 0, Math.PI * 2); ctx.stroke();
            ctx.fillStyle = "#0000FF";
            ctx.beginPath(); ctx.ellipse(x + 20, y + 22, 20, 25, 0, 0, Math.PI * 2); ctx.fill();
            ctx.strokeStyle = "#3d2b1f"; ctx.lineWidth = 5;
            ctx.beginPath(); ctx.moveTo(x + 2, y + 15); ctx.lineTo(x - 8, y + 30);
            ctx.moveTo(x + 38, y + 15); ctx.lineTo(x + 48, y + 30);
            ctx.moveTo(x + 12, y + 45); ctx.lineTo(x + 8, y + 60);
            ctx.moveTo(x + 28, y + 45); ctx.lineTo(x + 32, y + 60); ctx.stroke();
        }

        function drawObstacle(x, y) {
            ctx.fillStyle = "black";
            ctx.beginPath(); ctx.arc(x-10, y+40, 14, 0, Math.PI*2); ctx.arc(x+10, y+40, 14, 0, Math.PI*2); ctx.fill();
            ctx.beginPath(); 
            if(ctx.roundRect) ctx.roundRect(x-8, y+5, 16, 40, 5); 
            else ctx.rect(x-8, y+5, 16, 40);
            ctx.fill();
            ctx.beginPath(); ctx.ellipse(x, y+5, 11, 8, 0, 0, Math.PI*2); ctx.fill();
        }

        function update() {
            if (!gameActive) return;
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            if (!player.grounded) { player.dy += player.gravity; player.y += player.dy; }
            if (player.y >= 160) { player.y = 160; player.grounded = true; }
            drawCharacter(player.x, player.y);
            if (Math.random() < 0.015) obstacles.push({ x: canvas.width + 50, y: 160 });
            obstacles.forEach((obs, index) => {
                obs.x -= 7;
                drawObstacle(obs.x, obs.y);
                if (player.x + 30 > obs.x - 15 && player.x < obs.x + 15 && player.y + 45 > obs.y) {
                    gameActive = false;
                    clearTimeout(musicTimeout);
                    playDeath();
                    speakMoan('death');
                    setTimeout(() => { location.reload(); }, 3000);
                }
                if (obs.x + 30 < 0) { obstacles.splice(index, 1); score++; }
            });
            ctx.fillStyle = "#d14789"; ctx.font = "20px Arial";
            ctx.fillText("Puntos: " + score, 480, 40);
            requestAnimationFrame(update);
        }

        const jump = () => { 
            if (!musicStarted) { playMarioFull(); musicStarted = true; }
            if (player.grounded && gameActive) { 
                player.dy = -player.jumpForce; 
                player.grounded = false;
                speakMoan('jump'); 
            } 
        };

        window.addEventListener("keydown", (e) => { if (e.code === "Space") jump(); });
        canvas.addEventListener("click", jump);
        update();
    </script>
</body>
</html>
